front:
  text: 朝真發願懴悔文淨口業咒𣾰三綺妄謟讒兼兩舌悖辭詬詆恣凌人願談道徳攺前愆語合天心口靈聖
  hash: sha256:37101a9400944e6fa07f88feb499971198ac20101182efdf0a60a896e6673d1a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0022_HFL_000-001a, image: hfl/1064/1064-100.png}
body:
  text: 淨身業咒殺盗滛邪污行免慈廉正直可通神是為清淨自然身四獸百靈長擁護淨心業咒道境清明無穢淨貪嗔癡昧曰妖邪澄心㓕念等虚空是即大羅無色界祝香神化無方誠可格誠心有禱假香傅香雲浮盖大羅天仙仗浮空随應感祝功曹奉請功曹直符使此間土地至靈神昇天入地徧幽明逹悃傳香聞聖哲啓聖我等一心皈命禮天靈神寳大慈尊玄穹九辰諸帝真金母木公卿宰輔日月星辰司本命符章經道總真文五老三官大帝君四聖四相大法主傳道傳法傳經籙流芳演𣲖衆宗師諸階法部統真靈雷霆岳鄷官將吏十方無量神仙侣同垂應感赴靈塲慈悲接引學仙人随願克成無上道經誥随意念誦畢回向經功號力不思議回向十方諸聖衆願鑒真情求懴悔河沙罪障尽消除懴悔願發懴悔我等自從曩刧廼至今生假火風地水以成形戀香味色聲而觸法食嗔痴妬惡口妄言殺盗邪滛恣情縱欲逆辱父母背負君師不敬天地神祇呵風罵雨不信罪福因果昧理欺心遂致報對升沉輪廻展轉受諸苦惱無有休停皆由一念之差陣迷自性妄認六塵之幻沉溺愛河今而既獲人身叨親正教豈非千生慶幸一旦遭逢自合省心早求度世若復似前流蕩畢竟迷失本来一堕𡨋途化為異類是故思沉淪苦發清淨心皈奉聖真特求懴悔丐憐愚昧原赦罪愆觧釋報縁蠲消魔陣所覬命逄昌運名注丹䑓際遇真師親聞至道精修妙行増長善芽盡節玄門怡神真境他日運應滅度自性不至昏迷徑生十善之家䏻通宿命還證上乗之道臣事虚皇尚願國安民豊時和𡻕稔願真風不闡道化興行願兇惡化賢邪魔皈正願兵刑罔措囹圄空閑願沉滯昇遷𡨚仇和釋願叅玄學者入道成真願歴刧種親均諧超度願歷世師友同證真常願所有縁増崇福慧願所傷物命早生人天願節食酒葷不相殺害願持身端正不履滛邪願悉破慳貪悉除嶮峻願言無誑妄行貴真誠願弱已饒人潜忍忿怒願慈心下氣㳟敬一切願不堕邉夷不随邪見願結交仙友栖集消虚願智惠開明神通恢廓願廣行方便普濟群生願永㫁執迷咸歸至道塵刧有盡我願無窮端望帝真曲垂濟度皈命禮謝無上正真三寳祝謝向来禮念諸功徳全頼慈悲為主盟仰瞻仙仗𨼆空玄法部真靈長擁護稽首皈依無極妙道朝真發願懴悔文終
