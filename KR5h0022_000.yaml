front:
  text: 朝真發願懴悔文淨口業咒𣾰三綺妄諂讒兼兩舌悖辭詬詆恣凌人願談道德攺前愆語合天心口靈聖
  hash: sha256:7b32cf7a09e2aa978c68e06a808e04386950111e9e7afe168aeda831ac464b1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0022_HFL_000-001a, image: hfl/1064/1064-100.png}
body:
  text: 淨身業咒殺盜淫邪污行免慈廉正直可通神是為清淨自然身四獸百靈長擁護淨心業咒道境清明無穢淨貪嗔癡昧曰妖邪澄心滅念等虛空是即大羅無色界祝香神化無方誠可格誠心有禱假香傅香雲浮蓋大羅天仙仗浮空隨應感祝功曹奉請功曹直符使此間土地至靈神升天入地遍幽明逹悃傳香聞聖哲啓聖我等一心皈命禮天靈神寶大慈尊玄穹九辰諸帝真金母木公卿宰輔日月星辰司本命符章經道總真文五老三官大帝君四聖四相大法主傳道傳法傳經籙流芳演𣲖衆宗師諸階法部統真靈雷霆嶽鄷官將吏十方無量神仙侣同垂應感赴靈場慈悲接引學仙人隨願克成無上道經誥隨意念誦畢回向經功號力不思議回向十方諸聖衆願鑒真情求懴悔河沙罪障盡消除懴悔願發懴悔我等自從曩劫乃至今生假火風地水以成形戀香味色聲而觸法食嗔癡妬惡口妄言殺盜邪淫恣情縱欲逆辱父母背負君師不敬天地神祇呵風罵雨不信罪福因果昧理欺心遂致報對升沉輪回展轉受諸苦惱無有休停皆由一念之差陳迷自性妄認六塵之幻沉溺愛河今而既獲人身叨親正教豈非千生慶幸一旦遭逢自合省心早求度世若復似前流蕩畢竟迷失本來一墮𡨋途化為異類是故思沉淪苦發清淨心皈奉聖真特求懴悔丐憐愚昧原赦罪愆解釋報緣蠲消魔陳所覬命逄昌運名注丹臺際遇真師親聞至道精修妙行增長善芽盡節玄門怡神真境他日運應滅度自性不至昏迷徑生十善之家能通宿命還證上乘之道臣事虛皇尚願國安民豐時和歲稔願真風不闡道化興行願凶惡化賢邪魔皈正願兵刑罔措囹圄空間願沉滯升遷𡨚仇和釋願參玄學者入道成真願歷劫種親均諧超度願歷世師友同證真常願所有緣增崇福慧願所傷物命早生人天願節食酒葷不相殺害願持身端正不履淫邪願悉破慳貪悉除嶮峻願言無誑妄行貴真誠願弱已饒人潛忍忿怒願慈心下氣恭敬一切願不墮邉夷不隨邪見願結交仙友栖集消虛願智惠開明神通恢廓願廣行方便普濟群生願永斷執迷咸歸至道塵劫有盡我願無窮端望帝真曲垂濟度皈命禮謝無上正真三寶祝謝向來禮念諸功德全賴慈悲為主盟仰瞻仙仗隱空玄法部真靈長擁護稽首皈依無極妙道朝真發願懴悔文終
